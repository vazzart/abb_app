name: Build Add-on

on:
  push:
    branches: [main]
    paths:
      - cmd/**
      - config/**
      - internal/**
      - go.mod
      - go.sum
      - android_bridge_bot/Dockerfile
      - android_bridge_bot/config.yaml
      - android_bridge_bot/rootfs/**
      - .github/workflows/addon-build.yml

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - arch: aarch64
            docker_platform: linux/arm64
            go_arch: arm64
          - arch: amd64
            docker_platform: linux/amd64
            go_arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Go source into add-on directory
        run: make prepare-addon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract add-on version
        id: version
        run: |
          VERSION=$(grep '^version:' android_bridge_bot/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: android_bridge_bot
          platforms: ${{ matrix.docker_platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-addon-abb-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-addon-abb-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:bookworm
            TARGETARCH=${{ matrix.go_arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
